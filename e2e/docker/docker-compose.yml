# SPDX-License-Identifier: Apache-2.0
#
# Docker Compose for Bulwark e2e testing with real package manager clients.
#
# Usage:
#   cd e2e/docker && docker compose up --build --abort-on-container-exit
#
# Architecture:
#   - 3 proxy containers (pypi, npm, maven) built from project Dockerfiles
#   - 3 client containers (python, node, java) running real package manager installs
#   - All containers share a bridge network; clients reach proxies by service name

services:
  # ─── Curation proxies ────────────────────────────────────────────────────────

  pypi-proxy:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-allow-all.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  pypi-proxy-age-block:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-min-age-block.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  pypi-proxy-age-pinned:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-min-age-pinned.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-allow-all.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-age-block:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-min-age-block.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-age-pinned:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-min-age-pinned.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-allow-all.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy-age-block:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-min-age-block.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy-age-pinned:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-min-age-pinned.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  # ─── PyPI rule-specific proxies ──────────────────────────────────────────────

  pypi-proxy-block-prerelease:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-block-prerelease-pkg.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  pypi-proxy-explicit-deny:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-explicit-deny.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  pypi-proxy-global-defaults:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-global-defaults.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  pypi-proxy-version-pattern:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-version-pattern.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  pypi-proxy-real-life:
    build:
      context: ../..
      dockerfile: pypi-bulwark/Dockerfile
    volumes:
      - ./configs/pypi-real-life.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  # ─── npm rule-specific proxies ───────────────────────────────────────────────

  npm-proxy-block-prerelease:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-block-prerelease-pkg.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-explicit-deny:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-explicit-deny.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-global-defaults:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-global-defaults.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-version-pattern:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-version-pattern.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-install-scripts:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-install-scripts.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-trusted-packages:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-trusted-packages.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  npm-proxy-real-life:
    build:
      context: ../..
      dockerfile: npm-bulwark/Dockerfile
    volumes:
      - ./configs/npm-real-life.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  # ─── Maven rule-specific proxies ─────────────────────────────────────────────

  maven-proxy-block-snapshots:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-block-snapshots-pkg.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy-block-prerelease:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-block-prerelease-pkg.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy-explicit-deny:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-explicit-deny.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy-global-defaults:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-global-defaults.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy-version-pattern:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-version-pattern.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  maven-proxy-real-life:
    build:
      context: ../..
      dockerfile: maven-bulwark/Dockerfile
    volumes:
      - ./configs/maven-real-life.yaml:/config.yaml:ro
    networks:
      - bulwark-e2e

  # ─── Client test runners ─────────────────────────────────────────────────────

  test-python:
    build:
      context: ./clients/python
    depends_on:
      pypi-proxy:
        condition: service_started
      pypi-proxy-age-block:
        condition: service_started
      pypi-proxy-age-pinned:
        condition: service_started
      pypi-proxy-block-prerelease:
        condition: service_started
      pypi-proxy-explicit-deny:
        condition: service_started
      pypi-proxy-global-defaults:
        condition: service_started
      pypi-proxy-version-pattern:
        condition: service_started
      pypi-proxy-real-life:
        condition: service_started
    environment:
      - PYPI_PROXY_URL=http://pypi-proxy:8080
      - PYPI_AGE_BLOCK_PROXY_URL=http://pypi-proxy-age-block:8080
      - PYPI_AGE_PINNED_PROXY_URL=http://pypi-proxy-age-pinned:8080
      - PYPI_BLOCK_PRERELEASE_PROXY_URL=http://pypi-proxy-block-prerelease:8080
      - PYPI_EXPLICIT_DENY_PROXY_URL=http://pypi-proxy-explicit-deny:8080
      - PYPI_GLOBAL_DEFAULTS_PROXY_URL=http://pypi-proxy-global-defaults:8080
      - PYPI_VERSION_PATTERN_PROXY_URL=http://pypi-proxy-version-pattern:8080
      - PYPI_REAL_LIFE_PROXY_URL=http://pypi-proxy-real-life:8080
    networks:
      - bulwark-e2e

  test-node:
    build:
      context: ./clients/node
    depends_on:
      npm-proxy:
        condition: service_started
      npm-proxy-age-block:
        condition: service_started
      npm-proxy-age-pinned:
        condition: service_started
      npm-proxy-block-prerelease:
        condition: service_started
      npm-proxy-explicit-deny:
        condition: service_started
      npm-proxy-global-defaults:
        condition: service_started
      npm-proxy-version-pattern:
        condition: service_started
      npm-proxy-install-scripts:
        condition: service_started
      npm-proxy-trusted-packages:
        condition: service_started
      npm-proxy-real-life:
        condition: service_started
    environment:
      - NPM_PROXY_URL=http://npm-proxy:8080
      - NPM_AGE_BLOCK_PROXY_URL=http://npm-proxy-age-block:8080
      - NPM_AGE_PINNED_PROXY_URL=http://npm-proxy-age-pinned:8080
      - NPM_BLOCK_PRERELEASE_PROXY_URL=http://npm-proxy-block-prerelease:8080
      - NPM_EXPLICIT_DENY_PROXY_URL=http://npm-proxy-explicit-deny:8080
      - NPM_GLOBAL_DEFAULTS_PROXY_URL=http://npm-proxy-global-defaults:8080
      - NPM_VERSION_PATTERN_PROXY_URL=http://npm-proxy-version-pattern:8080
      - NPM_INSTALL_SCRIPTS_PROXY_URL=http://npm-proxy-install-scripts:8080
      - NPM_TRUSTED_PACKAGES_PROXY_URL=http://npm-proxy-trusted-packages:8080
      - NPM_REAL_LIFE_PROXY_URL=http://npm-proxy-real-life:8080
    networks:
      - bulwark-e2e

  test-java:
    build:
      context: ./clients/java
    depends_on:
      maven-proxy:
        condition: service_started
      maven-proxy-age-block:
        condition: service_started
      maven-proxy-age-pinned:
        condition: service_started
      maven-proxy-block-snapshots:
        condition: service_started
      maven-proxy-block-prerelease:
        condition: service_started
      maven-proxy-explicit-deny:
        condition: service_started
      maven-proxy-global-defaults:
        condition: service_started
      maven-proxy-version-pattern:
        condition: service_started
      maven-proxy-real-life:
        condition: service_started
    environment:
      - MAVEN_PROXY_URL=http://maven-proxy:8080
      - MAVEN_AGE_BLOCK_PROXY_URL=http://maven-proxy-age-block:8080
      - MAVEN_AGE_PINNED_PROXY_URL=http://maven-proxy-age-pinned:8080
      - MAVEN_BLOCK_SNAPSHOTS_PROXY_URL=http://maven-proxy-block-snapshots:8080
      - MAVEN_BLOCK_PRERELEASE_PROXY_URL=http://maven-proxy-block-prerelease:8080
      - MAVEN_EXPLICIT_DENY_PROXY_URL=http://maven-proxy-explicit-deny:8080
      - MAVEN_GLOBAL_DEFAULTS_PROXY_URL=http://maven-proxy-global-defaults:8080
      - MAVEN_VERSION_PATTERN_PROXY_URL=http://maven-proxy-version-pattern:8080
      - MAVEN_REAL_LIFE_PROXY_URL=http://maven-proxy-real-life:8080
    networks:
      - bulwark-e2e

networks:
  bulwark-e2e:
    driver: bridge
