# npm PKGuard — per-package block_pre_release rule.
# Blocks pre-release versions of react; stable versions pass.
server:
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://registry.npmjs.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 120
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  rules:
    - name: "block-pre-releases-react"
      package_patterns: ["react"]
      action: "deny"
      block_pre_release: true
      reason: "pre-release versions are not permitted"
