# Maven Bulwark — global defaults: block_pre_releases + min_package_age_days.
# All packages without a specific rule hit the global defaults (age blocks most things).
# commons-io has a bypass_age_filter rule so it still passes.
server:
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://repo1.maven.org/maven2"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 120
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  defaults:
    block_pre_releases: true
    min_package_age_days: 10000
  rules:
    - name: "bypass-age-for-commons-io"
      package_patterns: ["commons-io:commons-io"]
      bypass_age_filter: true
