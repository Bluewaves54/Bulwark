# PyPI Bulwark — per-package block_pre_release rule.
# Blocks pre-release versions of packaging; stable versions pass.
# packaging 26.0rc1 is a known pre-release; 24.2 is a known stable release.
server:
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://pypi.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 120
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  rules:
    - name: "block-pre-releases-packaging"
      package_patterns: ["packaging"]
      action: "deny"
      block_pre_release: true
      reason: "pre-release versions are not permitted"
