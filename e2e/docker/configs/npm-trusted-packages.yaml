# npm Bulwark — trusted packages + install scripts deny.
# Trusts @types/* (bypasses all rules) while blocking install scripts globally.
# Also blocks everything else with age 10000 + pre-release block.
server:
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://registry.npmjs.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 120
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  trusted_packages:
    - "@types/*"
  install_scripts:
    enabled: true
    action: "deny"
    reason: "packages with install scripts are not permitted"
    allowed_with_scripts: []
  rules:
    - name: "block-everything-untrusted"
      package_patterns: ["*"]
      min_package_age_days: 10000
