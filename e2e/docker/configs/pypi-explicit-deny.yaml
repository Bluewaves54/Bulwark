# PyPI Bulwark — explicit deny rule (action: deny).
# Completely denies all versions of urllib3; other packages pass.
server:
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://pypi.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 120
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  rules:
    - name: "deny-urllib3"
      package_patterns: ["urllib3"]
      action: "deny"
      reason: "urllib3 is blocked by policy"
