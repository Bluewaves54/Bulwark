# Maven Bulwark — Docker e2e block snapshots config.
server:
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://repo1.maven.org/maven2"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 120
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  defaults: {}
  rules:
    - name: "block-snapshots"
      package_patterns: ["*"]
      action: "deny"
      block_snapshots: true
      reason: "snapshot versions are not permitted"
