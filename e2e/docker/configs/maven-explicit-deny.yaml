# Maven Bulwark — explicit deny rule (action: deny).
# Completely denies all versions of junit:junit; commons-io passes.
server:
  port: 8080
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://repo1.maven.org/maven2"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 120
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  rules:
    - name: "deny-junit"
      package_patterns: ["junit:junit"]
      action: "deny"
      reason: "junit is blocked by policy"
