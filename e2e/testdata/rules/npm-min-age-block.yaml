# npm Bulwark — e2e minimum-age block configuration.
# Uses min_package_age_days: 10000 to block ALL versions of ms
# (no version is older than ~27 years, so everything published after the cutoff is denied).

server:
  port: 18204
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://registry.npmjs.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 60
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  rules:
    - name: "min-age-block-ms"
      package_patterns: ["ms"]
      min_package_age_days: 10000
