# npm Bulwark — e2e install_scripts deny configuration.
# Blocks any package that declares preinstall/install/postinstall lifecycle scripts.
# esbuild has a postinstall script; lodash does not.

server:
  port: 18206
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://registry.npmjs.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 60
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  install_scripts:
    enabled: true
    action: "deny"
    reason: "packages with install scripts are not permitted"
    allowed_with_scripts: []
