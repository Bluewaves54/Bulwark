# PyPI PKGuard — e2e block pre-release configuration.

server:
  port: 18200
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://pypi.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 60
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  defaults:
    block_pre_releases: true
  rules: []
