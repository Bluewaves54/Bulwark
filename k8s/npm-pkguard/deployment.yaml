---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: npm-pkguard
  labels:
    app: npm-pkguard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: npm-pkguard
  template:
    metadata:
      labels:
        app: npm-pkguard
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: npm-pkguard
          image: ghcr.io/PKGuard/npm-pkguard:latest
          imagePullPolicy: IfNotPresent
          args: ["-config", "/etc/pkguard/config.yaml"]
          ports:
            - name: http
              containerPort: 18001
              protocol: TCP
          env:
            - name: PORT
              value: "18001"
            - name: PKGUARD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: npm-pkguard-auth
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/pkguard
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          configMap:
            name: npm-pkguard-config
