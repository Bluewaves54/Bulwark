---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vsx-bulwark-config
data:
  config.yaml: |
    server:
      port: 18003
      read_timeout_seconds: 30
      write_timeout_seconds: 30
      idle_timeout_seconds: 60

    upstream:
      url: "https://open-vsx.org"
      timeout_seconds: 30
      username: ""
      password: ""
      token: ""
      tls:
        insecure_skip_verify: false

    cache:
      ttl_seconds: 300
      max_size_mb: 256

    metrics:
      enabled: true

    logging:
      level: "info"
      format: "json"

    policy:
      dry_run: false
      rules:
        - name: "block-pre-release"
          action: "deny"
          block_pre_release: true
          reason: "Pre-release extension versions are not permitted"
