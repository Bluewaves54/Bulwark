# npm Bulwark — Best Practices Configuration
# Deploy this config on Friday and immediately protect your org.
# Sensible defaults: blocks young packages (7 days), sketchy install scripts, known malware.

server:
  port: 18001
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://registry.npmjs.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 300
  max_size_mb: 256

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"
  # file_path: "/var/log/bulwark/npm.log"

policy:
  dry_run: false
  fail_mode: "closed" # Block uninspected artifacts

  trusted_packages:
    - "@types/*"
    - "@babel/*"
    - "@angular/*"
    - "react"
    - "react-dom"
    - "vue"
    - "next"
    - "typescript"
    - "webpack"
    - "babel"
    - "eslint"
    - "prettier"
    - "jest"

  install_scripts:
    enabled: true
    action: "deny"
    allowed_with_scripts:
      - "esbuild"
      - "node-gyp"
      - "sharp"
    reason: "Install scripts are blocked by default unless explicitly trusted"

  rules:
    - name: "block-pre-release"
      action: "deny"
      block_pre_release: true
      reason: "Pre-release versions not permitted in production"

    - name: "minimum-age-quarantine"
      action: "deny"
      min_package_age_days: 7
      reason: "Package must be 7+ days old; quarantine prevents zero-day exploits"

    - name: "typosquat-detection"
      action: "deny"
      typosquat_check:
        enabled: true
        max_levenshtein_dist: 2
        protected_packages:
          - "lodash"
          - "express"
          - "react"
          - "axios"
          - "chalk"
          - "commander"
          - "webpack"
          - "moment"
          - "debug"
          - "request"
      reason: "Package name looks like a typosquat of a popular package"

    - name: "block-known-malware"
      action: "deny"
      package_patterns:
        # High-confidence malicious / compromised packages
        - "event-stream"          # compromised in 2018 supply-chain attack
        - "flatmap-stream"        # malicious payload package used with event-stream
        - "ua-parser-js"          # compromised in 2021 malware incident
        - "coa"                   # compromised in 2021 and published malicious versions
        - "rc"                    # compromised in 2021 and published malicious versions
        - "eslint-scope"          # compromised in 2018 and used to exfiltrate credentials
        - "eslint-config-eslint"  # compromised package from same 2018 incident
        - "getcookies"            # malicious package injected via dependency chain
        - "mailparser"            # package involved in getcookies compromise chain
        - "colors"                # sabotaged release incident (2022)
        - "faker"                 # sabotaged release incident (2022)
        - "node-ipc"              # protestware incident (2022)
        - "peacenotwar"           # protestware payload package
        - "crossenv"              # known malicious typosquat of cross-env
        - "load-from-cwd-or-npm"  # known malicious package
        - "bootstrap-sass"        # 2019 — hijacked, dropped credential stealer
        - "ctx"                   # 2022 — hijacked, stole env vars
        - "discord.app"           # LofyGang stealer campaign
        - "discord.js-user"       # LofyGang stealer campaign
      reason: "Known malicious, compromised, or typosquatted package"
