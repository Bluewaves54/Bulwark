server:
  port: 18013
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://open-vsx.org"
  registry_type: "openvsx"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 60
  max_size_mb: 128

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  rules:
    - name: "deny-yaml"
      action: "deny"
      package_patterns:
        - "redhat.vscode-yaml"
