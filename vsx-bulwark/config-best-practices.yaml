        - "pyscopexte.*"
        - "redcapcollective.*"
        - "rubyideext.*"
        - "runnerpost.*"
        - "shinypy.*"
        - "sol-studio.*"
        - "ssgwysc.*"
        - "studio-jjalaire-team.*"
        - "studio-velte-distributor.*"
        - "sun-shine-studio.*"
        - "sxatvo.*"
        - "tamokill12.*"
        - "thing-mn.*"
        - "tima-web-wang.*"
        - "tokcodes.*"
        - "toowespace.*"
        - "treedotree.*"
        - "tucyzirille-studio.*"
        - "turbobase.*"
        - "twilkbilk.*"
        - "vce-brendan-studio-eich.*"
        - "yamaprolas.*"
        # Generic malicious extension name patterns
        - "*-malicious-loader*"
        - "*cryptominer*"
        - "*credential-stealer*"
      reason: "Known malicious or compromised VS Code extension (Glassworm campaign)"

  defaults:
    min_package_age_days: 3
    block_pre_releases: false
