# PyPI PKGuard — Best Practices Configuration
# Deploy this config on Friday and immediately protect your org.
# Sensible defaults: blocks young packages (3 days), known malware, pre-releases.

server:
  port: 18000
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://pypi.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  allowed_external_hosts:
    - "files.pythonhosted.org"
    - "pypi.org"
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 300
  max_size_mb: 256

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  fail_mode: "closed" # Block uninspected artifacts

  trusted_packages:
    - "pip"
    - "setuptools"
    - "wheel"
    - "build"
    - "numpy*"
    - "scipy*"
    - "pandas*"
    - "django*"
    - "flask*"
    - "requests"
    - "pytest"
    - "black"
    - "pylint"
    - "mypy"

  rules:
    - name: "block-pre-release"
      action: "deny"
      block_pre_release: true
      reason: "Pre-release versions not permitted in production"

    - name: "minimum-age-quarantine"
      action: "deny"
      min_package_age_days: 7
      reason: "Package must be 7+ days old; quarantine prevents zero-day exploits"

    - name: "block-known-malware"
      action: "deny"
      package_patterns:
        # Typosquats of popular packages
        - "python3-dateutil"      # typosquat of python-dateutil (2019)
        - "python-dateutil-fake"  # typosquat of python-dateutil
        - "jeIlyfish"             # typosquat of jellyfish (capital I for l, 2019)
        - "colourama"             # typosquat of colorama (2019)
        - "colorsama"             # typosquat of colorama
        - "requessts"             # typosquat of requests
        - "requst"                # typosquat of requests
        - "reequests"             # typosquat of requests
        - "beautifulsoup"         # typosquat of beautifulsoup4
        - "beautifulsoup4-malware" # impersonation of beautifulsoup4
        - "pythonkafka"           # typosquat of python-kafka
        - "python-mongo"          # typosquat of pymongo
        - "urllib"                # typosquat of urllib3
        - "urlib3"                # typosquat of urllib3
        - "psychopg2"             # typosquat of psycopg2
        - "djanga"                # typosquat of django
        - "dajngo"                # typosquat of django
        - "openvc-python"         # typosquat of opencv-python
        - "nmap-python"           # typosquat of python-nmap
        - "pylnit"                # typosquat of pylint
        - "pyymal"                # typosquat of pyyaml
        - "pyjoson"               # typosquat of pyjson

        # Confirmed malicious (stealers, RATs, cryptominers)
        - "noblesse"              # 2021 — Discord token + credit card stealer
        - "genesisbot"            # 2021 — stealer
        - "artic"                 # 2021 — stealer
        - "creamsicle"            # 2021 — stealer
        - "discordcmd"            # Discord token stealer
        - "colourfool"            # 2023 — RAT
        - "daboralib"             # 2023 — stealer
        - "pystob"                # stealer
        - "easytimestamp"         # trojan
        - "keylogger"             # keylogger
        - "cryptominer"           # cryptominer
        - "ctx"                   # 2022 — hijacked, stole env vars + AWS keys
        - "phpass"                # 2022 — hijacked, stole AWS keys
        - "maboroshi"             # 2023 — stealer
        - "culturestreak"         # 2023 — cryptominer targeting GitLab CI
        - "secretslib"            # 2022 — dropped cryptominer via Kubernetes
        - "libpeshka"             # 2023 — stealer
        - "pyloras"               # 2023 — stealer
        - "pybmpipe"             # typosquat deploying W4SP stealer
        - "chatgpt-python"        # 2023 — impersonation, stealer
      reason: "Known malicious, compromised, or typosquatted package"
