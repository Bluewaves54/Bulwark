# npm PKGuard — Best Practices Configuration
# Deploy this config on Friday and immediately protect your org.
# Sensible defaults: blocks young packages (3 days), sketchy install scripts, known malware.

server:
  port: 18001
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://registry.npmjs.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 300
  max_size_mb: 256

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  fail_mode: "closed" # Block uninspected artifacts

  trusted_packages:
    - "@types/*"
    - "@babel/*"
    - "@angular/*"
    - "@react/*"
    - "react"
    - "react-dom"
    - "vue"
    - "next"
    - "typescript"
    - "webpack"
    - "babel"
    - "eslint"
    - "prettier"
    - "jest"

  install_scripts:
    enabled: true
    action: "deny"
    allowed_with_scripts:
      - "esbuild"
      - "node-gyp"
      - "sharp"
    reason: "Install scripts are blocked by default unless explicitly trusted"

  rules:
    - name: "block-pre-release"
      action: "deny"
      block_pre_release: true
      reason: "Pre-release versions not permitted in production"

    - name: "minimum-age-quarantine"
      action: "deny"
      min_package_age_days: 7
      reason: "Package must be 7+ days old; quarantine prevents zero-day exploits"

    - name: "typosquat-detection"
      action: "deny"
      typosquat_check:
        enabled: true
        max_levenshtein_dist: 2
        protected_packages:
          - "lodash"
          - "express"
          - "react"
          - "axios"
          - "chalk"
          - "commander"
          - "webpack"
          - "moment"
          - "debug"
          - "request"
      reason: "Package name looks like a typosquat of a popular package"

    - name: "block-known-malware"
      action: "deny"
      package_patterns:
        # Backdoored / hijacked packages
        - "event-stream"          # 2018 — cryptocurrency-stealing backdoor
        - "flatmap-stream"        # 2018 — malicious dependency of event-stream
        - "ua-parser-js"          # 2021 — compromised, cryptominer + password stealer
        - "coa"                   # 2021 — hijacked, dropped malware
        - "rc"                    # 2021 — hijacked alongside coa
        - "eslint-scope"          # 2018 — hijacked, stole npm tokens
        - "eslint-config-eslint"  # 2018 — hijacked alongside eslint-scope
        - "getcookies"            # 2018 — backdoored via mailparser dependency chain
        - "mailparser"            # 2018 — pulled in getcookies backdoor (v2.2.3)
        - "bootstrap-sass"        # 2019 — hijacked, dropped credential stealer

        # Sabotaged by maintainer
        - "colors"                # 2022 — infinite loop (v1.4.1+)
        - "faker"                 # 2022 — infinite loop (v6.6.6+)
        - "node-ipc"              # 2022 — protestware, wiped files (v10.1.1+)
        - "peacenotwar"           # 2022 — protestware dependency of node-ipc

        # Typosquats / dependency confusion
        - "crossenv"              # typosquat of cross-env
        - "cross-env.js"          # typosquat of cross-env
        - "mongose"               # typosquat of mongoose
        - "babelcli"              # typosquat of babel-cli
        - "coffescript"           # typosquat of coffeescript
        - "discordi.js"           # typosquat of discord.js
        - "discord.app"           # impersonation — LofyGang stealer
        - "discord.js-user"       # impersonation — LofyGang stealer
        - "http-proxy.js"         # typosquat of http-proxy
        - "sillly-datetime"       # typosquat of silly-datetime
        - "electorn"              # typosquat of electron
        - "load-from-cwd-or-npm"  # 2022 — trojan
        - "jquerry"               # typosquat of jquery
        - "loadsh"                # typosquat of lodash
        - "lodahs"                # typosquat of lodash
        - "lodashs"               # typosquat of lodash
        - "twiter"                # typosquat of twitter
        - "d3.js"                 # typosquat of d3
        - "mariadb"               # 2022 — dependency confusion attack
        - "ctx"                   # 2022 — hijacked, stole env vars
        - "socketio"              # typosquat of socket.io
        - "mssql.js"              # typosquat of mssql
        - "mssql-node"            # typosquat of mssql
      reason: "Known malicious, compromised, or typosquatted package"
