name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run unit tests before release
        run: |
          for mod in common pypi-pkguard npm-pkguard maven-pkguard; do
            (cd "$mod" && go test -count=1 -race ./...)
          done

      - name: Build cross-platform binaries
        run: bash scripts/build-release.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    name: Push Docker images
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          TAG=${GITHUB_REF_NAME}
          for mod in pypi-pkguard npm-pkguard maven-pkguard; do
            docker build -f "${mod}/Dockerfile" \
              -t "ghcr.io/${{ github.repository }}/${mod}:${TAG}" \
              -t "ghcr.io/${{ github.repository }}/${mod}:latest" .
            docker push "ghcr.io/${{ github.repository }}/${mod}:${TAG}"
            docker push "ghcr.io/${{ github.repository }}/${mod}:latest"
          done
