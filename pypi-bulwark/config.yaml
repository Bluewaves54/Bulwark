# PyPI Bulwark configuration

server:
  port: 18000
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://pypi.org"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  allowed_external_hosts:
    - "files.pythonhosted.org"
    - "pypi.org"
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 300
  max_size_mb: 256 # reserved for future use; not yet enforced

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"
  # file_path: "/var/log/bulwark/pypi.log"  # optional; logs also written to disk

policy:
  dry_run: false
  # fail_mode controls behaviour when package metadata cannot be parsed or
  # filtered by the policy engine.
  # "open"  (default) — passes the raw upstream response through with a warning.
  #                      Use for frictionless adoption and non-regulated environments.
  # "closed"           — returns 502 Bad Gateway to prevent uninspected artefacts
  #                      reaching clients. Recommended for regulated environments
  #                      (e.g. FedRAMP, SOC 2 Type II).
  fail_mode: "open"

  # trusted_packages lists package name glob patterns that bypass ALL rule
  # evaluation. Use for well-known packages maintained by trusted orgs.
  # Supports trailing wildcard: "numpy*", "django*".
  trusted_packages: []

  rules:
    - name: "block-pre-release"
      action: "deny"
      block_pre_release: true
      reason: "pre-release versions are not permitted"

    - name: "minimum-age"
      action: "deny"
      min_package_age_days: 7
      reason: "package must be at least 7 days old"
