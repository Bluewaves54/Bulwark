# Maven Bulwark — Best Practices Configuration
# Deploy this config on Friday and immediately protect your org.
# Sensible defaults: blocks snapshots, pre-releases, young artifacts (7 days).

server:
  port: 18002
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://repo1.maven.org/maven2"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 300
  max_size_mb: 256

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"
  # file_path: "/var/log/bulwark/maven.log"

policy:
  dry_run: false
  fail_mode: "closed" # Block uninspected artifacts

  trusted_packages:
    - "org.apache.*:*"
    - "org.springframework.*:*"
    - "junit:*"
    - "org.junit.*:*"
    - "org.mockito:*"
    - "com.google.*:*"
    - "com.fasterxml.*:*"
    - "org.slf4j:*"
    - "ch.qos.logback:*"

  rules:
    - name: "block-snapshots"
      action: "deny"
      block_snapshots: true
      reason: "SNAPSHOT versions not permitted; use stable releases only"

    - name: "block-pre-release"
      action: "deny"
      block_pre_release: true
      reason: "Pre-release versions not permitted in production"

    - name: "minimum-age-quarantine"
      action: "deny"
      min_package_age_days: 7
      reason: "Artifact must be 7+ days old; quarantine prevents zero-day exploits"

    - name: "block-known-malware"
      action: "deny"
      package_patterns:
        # High-confidence malicious coordinates from public malware incidents
        - "com.github.nicercs:log4j-core"         # malicious impersonation coordinate
        - "com.github.nicercs:log4j-api"          # malicious impersonation coordinate
        - "io.github.nicercs:*"                   # malicious namespace used in impersonation campaign
        - "xyz.excitedbryo:*"                     # 2023 — cryptominer (Sonatype advisory)
      reason: "Known malicious, dependency-confused, or typosquatted artifact"
