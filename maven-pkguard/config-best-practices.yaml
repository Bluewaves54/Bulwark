# Maven PKGuard — Best Practices Configuration
# Deploy this config on Friday and immediately protect your org.
# Sensible defaults: blocks snapshots, pre-releases, young artifacts (3 days).

server:
  port: 18002
  read_timeout_seconds: 30
  write_timeout_seconds: 30
  idle_timeout_seconds: 60

upstream:
  url: "https://repo1.maven.org/maven2"
  timeout_seconds: 30
  username: ""
  password: ""
  token: ""
  tls:
    insecure_skip_verify: false

cache:
  ttl_seconds: 300
  max_size_mb: 256

metrics:
  enabled: true

logging:
  level: "info"
  format: "text"

policy:
  dry_run: false
  fail_mode: "closed" # Block uninspected artifacts

  trusted_packages:
    - "org.apache.*:*"
    - "org.springframework.*:*"
    - "junit:*"
    - "org.junit.*:*"
    - "org.mockito:*"
    - "com.google.*:*"
    - "com.fasterxml.*:*"
    - "org.slf4j:*"
    - "ch.qos.logback:*"

  rules:
    - name: "block-snapshots"
      action: "deny"
      block_snapshots: true
      reason: "SNAPSHOT versions not permitted; use stable releases only"

    - name: "block-pre-release"
      action: "deny"
      block_pre_release: true
      reason: "Pre-release versions not permitted in production"

    - name: "minimum-age-quarantine"
      action: "deny"
      min_package_age_days: 7
      reason: "Artifact must be 7+ days old; quarantine prevents zero-day exploits"

    - name: "block-known-malware"
      action: "deny"
      package_patterns:
        # Dependency confusion / namespace impersonation
        - "com.malicious:*"                       # generic malicious namespace
        - "org.compromised:*"                     # generic compromised namespace

        # Log4Shell era impersonation (2021-2022)
        - "com.github.nicercs:log4j-core"         # impersonation of Apache Log4j
        - "com.github.nicercs:log4j-api"          # impersonation of Apache Log4j

        # Known malicious Maven artifacts (supply chain attacks)
        - "io.github.nicercs:*"                   # namespace used for malicious impersonations
        - "com.github.spring-cloud:*"             # impersonation of Spring Cloud
        - "com.github.springframwork:*"           # typosquat of springframework
        - "org.spriingframework:*"                # typosquat of springframework
        - "com.github.apachee:*"                  # typosquat of Apache namespace
        - "org.apaache:*"                         # typosquat of org.apache
        - "com.github.google-cloud:*"             # impersonation of Google Cloud
        - "io.github.junnit:*"                    # typosquat of junit
        - "com.github.amazonsdk:*"                # impersonation of AWS SDK

        # Confirmed malicious coordinates from security advisories
        - "xyz.excitedbryo:*"                     # 2023 — cryptominer
        - "io.github.nickets:*"                   # 2023 — stealer
        - "com.github.jitpack:*"                  # namespace squatting on JitPack
      reason: "Known malicious, dependency-confused, or typosquatted artifact"
